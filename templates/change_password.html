<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Changer le mot de passe - WaterMap</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 400px;
    }
    h1 { color: #333; margin-bottom: 20px; text-align: center; }
    form { display: flex; flex-direction: column; gap: 15px; }
    input {
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
    }
    button {
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    .alert { padding: 10px; border-radius: 8px; margin-bottom: 15px; background: #fee2e2; color: #dc2626; font-size: 0.9rem; }
    .back { margin-top: 20px; text-align: center; }
    .back a { color: #667eea; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔒 Changer le mot de passe</h1>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <input type="password" name="old_password" placeholder="Ancien mot de passe" required>
      <input type="password" name="new_password" placeholder="Nouveau mot de passe" required>
      <button type="submit">Mettre à jour</button>
    </form>
    
    <div class="back">
      <a href="{{ url_for('home') }}">← Retour</a>
    </div>
  </div>
</body>
</html>
